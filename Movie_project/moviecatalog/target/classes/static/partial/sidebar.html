    <li><a id="admin-signout-btn" href="#">Sign Out</a></li>
  </ul>

<script>
  // Add event listener to the admin sign out button
  document.getElementById('admin-signout-btn').addEventListener('click', function(event) {
    event.preventDefault();

    // Remove admin authentication data
    localStorage.removeItem('isAdminSignedIn');
    localStorage.removeItem('adminUsername');
    localStorage.removeItem('adminPassword');

    console.log("Admin signed out from sidebar");

    // Redirect to the admin sign in page
    window.location.href = "../components/adminSignIn.html";
  });
</script>

</body>
